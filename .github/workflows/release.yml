name: Release Obsidian plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.1.0
        required: true
        default: 1.1.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate files
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css
          node -e "const m=require('./manifest.json'); if (m.version !== process.env.VERSION) { throw new Error('manifest version mismatch: '+m.version+' != '+process.env.VERSION); }"
        env:
          VERSION: ${{ inputs.version }}
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" main.js manifest.json styles.css --target "$GITHUB_SHA" --title "$VERSION" --notes "Weekly Todo Calendar $VERSION"
